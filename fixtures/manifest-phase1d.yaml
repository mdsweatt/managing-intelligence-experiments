# fixtures/manifest-phase1d.yaml — Experiment 1d fixture registry (charter v0.7 §5, Experiment 1d).
#
# A dedicated manifest so the frozen 1a/1c registries stay pristine. Self-contained for the whole 1d
# ladder: the 6 NEW tasks (#1/#7/#8/#15/#23/#24) plus the 3 REUSED 1c entries (#4 placebo, #6, #9 —
# byte-identical copies of fixtures/manifest-phase1c.yaml entries; same files, same hashes, never
# edited). Skill-off pilot run (design spine S3):
#   uv run python -m harness.run --matrix runs/phase1d-pilot.yaml \
#       --manifest fixtures/manifest-phase1d.yaml --usd-prior 25 --out results/
# The full 3-arm matrix (runs/phase1d.yaml) additionally passes --skill-manifest + --neutral-manifest.
#
# Design (charter §5 Exp 1d; docs/phase1d-build-notes.md "design spine — LOCKED"): every new task is
# a calibrated-loose baseline — a natural one-line request + a frozen input artifact, S band. The
# structure lives in the (skill-on) scaffold, never in the prompt, so H5/H7 measure scaffolding, not
# prompt verbosity. proxy.value = loose-fixture INPUT word count (prompt + input), the 1c convention:
# the loose baseline sets no target-output proxy, so input size is the only model-independent S-band
# selector. The paired scaffolds (fixtures/task-*/scaffold-example-DRAFT.md) stay PROVISIONAL until
# the skill-off pilot measures each task's natural output range (labels freeze in runs/phase1d.yaml).
#
# STATUS: 6 new fixtures FROZEN 2026-07-02 (sha256 via harness.hashing.fixture_hash, frozen:true)
# after the S2 owner + Gemini review (docs/phase1d-build-notes.md "S2 + neutral-block review").
# Frozen BEFORE the skill-off pilot runs on them — the pilot must run on immutable inputs or its
# measured natural ranges bind to nothing (invariants 3/5). `recorded_token_counts` are TBD: they are
# a COST-ESTIMATION input measured via the free count_tokens endpoint at the pilot cost-gate (the 1c
# precedent — counts are NOT part of the content freeze; the hash is).
