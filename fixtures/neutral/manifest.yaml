# fixtures/neutral/manifest.yaml — Experiment 1d neutral-system-block registry (charter §5 H8).
#
# A "neutral" block is the H8 CONTROL arm: a frozen `system` block that is per-task length-matched to
# that task's real skill (within ~±10% words) but holds ONLY generic, task-directed, structure-free
# role/quality framing — NO format/schema, NO required sections, NO scope list, and NO length guidance
# (not even soft cues like "concise"/"thorough"). It isolates "the scaffold's structure" from "a
# task-directed system block is present and engaged" (charter §5 H8; H8 kill-condition: the neutral
# arm reproduces ≥ ½ of the skill's CoV_output tightening => the effect is priming, not structure).
#
# Kept SEPARATE from fixtures/skills/manifest.yaml on purpose: the frozen skills registry stays
# untouched, and a neutral block is by construction NOT a skill. Same immutability contract
# (CLAUDE.md invariant 5): a frozen block carries a real sha256 = harness.hashing.skill_hash(bytes),
# identical text across all models (invariant 6). To revise, cut a new id (…-v2) — never edit bytes.
#
# STATUS: reviewed 2026-07-02 (owner + independent Gemini review, mirroring the 1c skill freeze).
# The review found the v1 blocks carried SCOPE constraints — faithfulness/anti-invention clauses
# ("do not introduce claims/numbers ... not supported"), an "even-handedly" echo of the #9 skill,
# and a soft brevity cue ("in a busy feed") — which belong to the SKILL's structure under test
# (charter §3 H8: "format/schema + scope/length constraints"), not to the control. A control arm
# carrying them could tighten CoV_output on its own and falsely kill H8. Per the revise rule the v1
# bytes are untouched: **-v2 supersedes -v1** (v2 = pure role/quality framing, re-length-matched:
# #6 129/136 = -5.1%, #9 155/158 = -1.9%). v1 entries are retained below for the record and for
# harness-mechanics tests only — `runs/phase1d.yaml` must reference the -v2 ids. The roster's
# remaining tasks get their neutral blocks with the task ladder (S2/S4) under the same rule:
# role/quality framing ONLY — no faithfulness/scope clauses, no stance words, no audience-attention
# cues that imply length.
