# fixtures/manifest.yaml — registry of frozen fixtures
#
# CONTRACT: a fixture is IMMUTABLE once listed and hashed. Its sha256 pins the exact
# (prompt, input) PAIR a record was produced from. New regime -> NEW fixture entry,
# never edit an existing one in place. (CLAUDE.md invariants 5 & 6.)
#
# Select content by a MODEL-INDEPENDENT proxy (words / pages / lines / files / turns); record
# the resulting token count as a consequence. Verified 2026-06-16: the tokenizer is NOT shared —
# Haiku 4.5 & Sonnet 4.6 share one (tok-hs); Opus 4.8 differs ~+35% (tok-opus). So record TWO
# counts per fixture: recorded_token_counts.{tok_hs, tok_opus}. (CLAUDE.md invariant 6, Rule 2 active.)

schema_version: 2   # v2 (2026-06-16): recorded_token_counts (two) replaces single recorded_token_count

# Per-fixture fields:
#   task_id, band            -> the cell this fixture serves
#   cost_axis                -> dominant axis (load-band §4): input|output|turns|payload|cached_context|thinking_depth
#   proxy: {type, value}     -> the model-independent selector actually used
#   files: {prompt, input}   -> paths under fixtures/<task-dir>/<band>/ ; 'input' omitted for fixed-small / output / thinking tasks
#   recorded_token_counts    -> { tok_hs: <Haiku/Sonnet count>, tok_opus: <Opus count> } (tokenizer NOT shared)
#   sha256                   -> sha256( canonical_json({"input": <input or null>, "prompt": <prompt>}) ):
#                               utf-8, sorted keys, compact separators, ensure_ascii=False; input is
#                               null (not "") when there is no input file. Domain-separated, NOT a
#                               literal prompt+input concatenation (which collides). Reproduce with
#                               harness.config.fixture_hash / fixture_hash_from_files. 'TBD' until frozen.
#   frozen                   -> false until curated + hashed, then true (and never edited). Enforced:
#                               frozen=true REQUIRES a 64-char hex sha256 (harness rejects frozen+'TBD').

