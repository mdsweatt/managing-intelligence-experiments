# runs/phase1c-pilot.yaml — Phase-1c COST-GATE micro-pilot (NOT the experiment).
#
# Purpose: measure actual OUTPUT tokens for the output-bearing cells so the 360-call cost
# projection rests on measurement, not a prior (CLAUDE.md invariant 1). This is a calibration
# artifact like runs/phase0.yaml — its records are a cost input ONLY and must NOT be mixed into the
# H5/H6 analysis (that is the frozen runs/phase1c.yaml at N=20).
#
# Scope: the 12 output cells (#6, #9 × {haiku,sonnet,opus} × {off,on}) at N=1 — one sample per cell
# is enough for a mean-output point estimate (a cost gate wants a conservative bound, not per-cell
# variance). #4 is a single-label task whose output is ~tiny; it is confirmed by one direct call
# outside this matrix (its input cost is already measured exactly via count_tokens).
#
# Run:
#   uv run python -m harness.run --matrix runs/phase1c-pilot.yaml \
#       --manifest fixtures/manifest-phase1c.yaml --skill-manifest fixtures/skills/manifest.yaml \
#       --usd-prior 25 --out results/

meta:
  phase: "1c-pilot"
  derived_from: docs/SPEC.md
  n_per_cell: 1                          # one sample per cell — point estimate for the projection only
  universal_opus_status: included
  gate: runs/phase0-calibration.yaml
  cost_ceiling_usd: 3                    # hard safety cap for the pilot (abort on breach)
  verified_live: 2026-06-16
  rate_tier: { itpm: 450000, otpm: 90000, rpm: 1000, as_of: 2026-06-22 }

defaults:
  max_tokens: model_ceiling
  temperature: omit
  effort: high

over_service:
  rule: not_applicable_factorial
  optional_as_used: false

models:
  haiku:  { id: claude-haiku-4-5-20251001, tokenizer: tok-hs,   cache_min: 4096, max_output: 64000 }
  sonnet: { id: claude-sonnet-4-6,         tokenizer: tok-hs,   cache_min: 1024, max_output: 128000 }
  opus:   { id: claude-opus-4-8,           tokenizer: tok-opus, cache_min: 1024, max_output: 128000 }

# Output-bearing tasks only — the cost drivers. #4 (input-axis, ~tiny output) is confirmed separately.
tasks:
  - { id: 6, name: short_form_copy,  cost_axis: output, bands: [S],
      factorial_models: [haiku, sonnet, opus], skill: short-form-copy-scaffold-v1 }
  - { id: 9, name: long_form_draft,  cost_axis: output, bands: [S],
      factorial_models: [haiku, sonnet, opus], skill: long-form-draft-scaffold-v1 }
